name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # --legacy-peer-deps è fondamentale per i progetti Lovable
        run: npm install --legacy-peer-deps

      - name: Fix permissions
        # Questo sblocca l'errore "sh: 1: vite: Permission denied"
        run: chmod +x ./node_modules/.bin/vite

      - name: Build
        # Usiamo npx per essere sicuri che trovi l'eseguibile corretto
        run: npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4