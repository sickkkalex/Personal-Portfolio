<svg fill="none" viewBox="0 0 800 200" width="800" height="200" xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
			<style>
				@keyframes gradient {
					0% { background-position: 0% 50%; }
					50% { background-position: 100% 50%; }
					100% { background-position: 0% 50%; }
				}
				@keyframes float {
					0% { transform: translateY(0px); }
					50% { transform: translateY(-10px); }
					100% { transform: translateY(0px); }
				}
				.container {
					background: linear-gradient(-45deg, #0f172a, #1e293b, #334155, #0f172a);
					background-size: 400% 400%;
					animation: gradient 15s ease infinite;
					width: 100%;
					height: 200px;
					display: flex;
					flex-direction: column;
					align-items: center;
					justify-content: center;
					border-radius: 12px;
					font-family: 'Inter', system-ui, -apple-system, sans-serif;
					color: white;
					overflow: hidden;
					position: relative;
				}
				.title {
					font-size: 48px;
					font-weight: 800;
					letter-spacing: -2px;
					margin: 0;
					animation: float 3s ease-in-out infinite;
					text-shadow: 0 10px 20px rgba(0,0,0,0.3);
				}
				.subtitle {
					font-size: 18px;
					font-weight: 300;
					opacity: 0.8;
					letter-spacing: 4px;
					text-transform: uppercase;
					margin-top: 8px;
				}
				.glow {
					position: absolute;
					width: 150px;
					height: 150px;
					background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, rgba(56, 189, 248, 0) 70%);
					border-radius: 50%;
					z-index: 0;
					animation: float 6s ease-in-out infinite;
				}
			</style>
			<div class="container">
				<div class="glow" style="top: -20px; left: 100px;"></div>
				<div class="glow" style="bottom: -20px; right: 100px; animation-delay: -3s;"></div>
				<h1 class="title">ALESSIO SAULLI</h1>
				<p class="subtitle">Creative Developer &amp; Designer</p>
			</div>
		</div>
	</foreignObject>
</svg>
